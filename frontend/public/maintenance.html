<!doctype html>
<html lang="nl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="theme-color" content="#111827" />
    <meta name="description" content="Upxero vernieuwt momenteel haar website." />

    <link rel="icon" href="%PUBLIC_URL%/favicon.png" />

    <title>Upxero – Website wordt vernieuwd</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI",
                Roboto, Arial, sans-serif;
            background: #111827;
            color: #d1d5db;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            max-width: 650px;
            width: 100%;
            background: #111827;
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            border: 1px solid #1f2937;
            box-shadow: 0 20px 60px rgba(0,0,0,.35);
        }

        /* Logo stijl zoals footer */
        .brand {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .logo-box {
            width: 48px;
            height: 48px;
            background: linear-gradient(
                135deg,
                #1e3a8a,
                #1d4ed8
            );
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-box img {
            width: 28px;
            height: 28px;
        }

        .brand-name {
            font-size: 30px;
            font-weight: 700;
            color: white;
            letter-spacing: .5px;
        }


        .icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 25px;
            border-radius: 50%;
            background: #f97316;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.15);
                opacity: .6;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }


        h1 {
            color: white;
            font-size: 34px;
            margin-bottom: 20px;
        }


        p {
            font-size: 17px;
            line-height: 1.7;
            color: #9ca3af;
            margin: 15px 0;
        }


        .highlight {
            color: white;
            font-weight: 600;
        }


        .button {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 28px;
            background: #f97316;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: .2s;
        }

        .button:hover {
            background: #ea580c;
        }


        .footer {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid #1f2937;
            font-size: 14px;
            color: #6b7280;
        }

    </style>

</head>


<body>

<div class="card">

    <div class="brand">

        <div class="logo-box">
            <img src="%PUBLIC_URL%/images/logo-white.png" alt="Upxero logo">
        </div>

        <div class="brand-name">
            UPXERO
        </div>

    </div>


    <div class="icon"></div>


    <h1>
        Website wordt vernieuwd
    </h1>


    <p>
        Wij werken momenteel aan een vernieuwde website 
        voor <span class="highlight">Upxero</span>.
    </p>


    <p>
        Binnenkort presenteren wij een frisse digitale ervaring
        voor horecaondernemers in België en Nederland.
    </p>


    <a href="mailto:info@upxero.com" class="button">
        Contact opnemen
    </a>


    <div class="footer">

        © 2026 Upxero — gebouwd voor horeca in België & Nederland

    </div>


</div>


</body>

</html>
