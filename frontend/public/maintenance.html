<!doctype html>
<html lang="nl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="theme-color" content="#111827" />
    <meta name="description" content="Upxero vernieuwt momenteel haar website. Binnenkort vindt u hier een vernieuwde ervaring." />

    <link rel="icon" href="%PUBLIC_URL%/favicon.png" />

    <title>Upxero – Website in onderhoud</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #111827, #1f2937);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 20px 50px rgba(0,0,0,.25);
        }

        .logo {
            max-width: 220px;
            margin-bottom: 30px;
        }

        .icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 25px;
            border-radius: 50%;
            background: #3b82f6;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.15);
                opacity: .6;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            font-size: 34px;
            margin-bottom: 20px;
        }

        p {
            font-size: 17px;
            line-height: 1.7;
            color: #d1d5db;
        }

        .highlight {
            color: white;
            font-weight: 600;
        }

        .button {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 28px;
            background: white;
            color: #111827;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: .2s;
        }

        .button:hover {
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #9ca3af;
        }
    </style>

</head>

<body>

<div class="container">

    <img 
        src="%PUBLIC_URL%/logo.png" 
        alt="Upxero" 
        class="logo"
    >

    <div class="icon"></div>

    <h1>Website wordt vernieuwd</h1>

    <p>
        Wij werken momenteel aan een volledig vernieuwde website 
        voor <span class="highlight">Upxero</span>.
    </p>

    <p>
        Binnenkort ontdekt u een frisse nieuwe ervaring met betere oplossingen
        voor horecaondernemers en bedrijven.
    </p>

    <a href="mailto:info@upxero.com" class="button">
        Contact opnemen
    </a>

    <div class="footer">
        © Upxero – Digitale oplossingen voor bedrijven
    </div>

</div>

</body>

</html>
